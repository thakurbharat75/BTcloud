name: Deploy to EC2

on:
  push:
    branches:
      - main  

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout the repository
      uses: actions/checkout@v2

    - name: Set up SSH
      uses: webfactory/ssh-agent@v0.5.3
      with:
        ssh-private-key: ${{ secrets.EC2_SSH_PRIVATE_KEY }}

    - name: Copy index.html to EC2
      run: |
        ssh -o StrictHostKeyChecking=no ubuntu@44.212.20.16 'sudo cp /var/www/index.html /var/www/html/index.html'

    - name: Restart Apache
      run: |
        ssh -o StrictHostKeyChecking=no ubuntu@44.212.20.16  'sudo systemctl restart httpd'
